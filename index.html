<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peter's Corner Of the Internet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        /* ========== THEME DEFINITIONS ========== */
        :root, [data-theme="gruvbox"] {
            --bg: #282828;
            --bg-sidebar: #1d2021;
            --bg-bar: #181818;
            --bg-card: #3c3836;
            --bg-hover: rgba(60, 56, 54, 0.5);
            --bg-active: rgba(60, 56, 54, 0.7);
            --border: rgba(60, 56, 54, 0.5);
            --border-bar: rgba(60, 56, 54, 0.4);
            --fg: #ebdbb2;
            --fg-bright: #fbf1c7;
            --fg-dim: #928374;
            --fg-muted: #665c54;
            --fg-subtle: #7c6f64;
            --accent: #b8bb26;
            --accent-dim: #98971a;
            --accent2: #d79921;
            --btn-bg: #ebdbb2;
            --btn-bg-hover: #fbf1c7;
            --btn-fg: #282828;
            --progress-bg: #504945;
            --progress-hover: #665c54;
            --grad-start: #fbf1c7;
            --grad-mid: #d79921;
            --grad-end: #fbf1c7;
            --tag-bg: rgba(60, 56, 54, 0.6);
            --tag-active-bg: #504945;
            --slider-thumb: #ebdbb2;
            --slider-thumb-hover: #fbf1c7;
            --glow: rgba(184, 187, 38, 0.4);
        }

        [data-theme="nord"] {
            --bg: #2e3440;
            --bg-sidebar: #272c36;
            --bg-bar: #22272f;
            --bg-card: #3b4252;
            --bg-hover: rgba(59, 66, 82, 0.5);
            --bg-active: rgba(59, 66, 82, 0.7);
            --border: rgba(59, 66, 82, 0.5);
            --border-bar: rgba(59, 66, 82, 0.4);
            --fg: #d8dee9;
            --fg-bright: #eceff4;
            --fg-dim: #7b88a1;
            --fg-muted: #4c566a;
            --fg-subtle: #616e88;
            --accent: #88c0d0;
            --accent-dim: #5e81ac;
            --accent2: #81a1c1;
            --btn-bg: #d8dee9;
            --btn-bg-hover: #eceff4;
            --btn-fg: #2e3440;
            --progress-bg: #4c566a;
            --progress-hover: #616e88;
            --grad-start: #eceff4;
            --grad-mid: #88c0d0;
            --grad-end: #81a1c1;
            --tag-bg: rgba(59, 66, 82, 0.6);
            --tag-active-bg: #4c566a;
            --slider-thumb: #d8dee9;
            --slider-thumb-hover: #eceff4;
            --glow: rgba(136, 192, 208, 0.4);
        }

        [data-theme="rosepine"] {
            --bg: #191724;
            --bg-sidebar: #1f1d2e;
            --bg-bar: #16141f;
            --bg-card: #26233a;
            --bg-hover: rgba(38, 35, 58, 0.6);
            --bg-active: rgba(38, 35, 58, 0.8);
            --border: rgba(38, 35, 58, 0.6);
            --border-bar: rgba(38, 35, 58, 0.4);
            --fg: #e0def4;
            --fg-bright: #e0def4;
            --fg-dim: #908caa;
            --fg-muted: #6e6a86;
            --fg-subtle: #7d7996;
            --accent: #c4a7e7;
            --accent-dim: #9076b5;
            --accent2: #ebbcba;
            --btn-bg: #e0def4;
            --btn-bg-hover: #f0efff;
            --btn-fg: #191724;
            --progress-bg: #393552;
            --progress-hover: #524f67;
            --grad-start: #ebbcba;
            --grad-mid: #c4a7e7;
            --grad-end: #f6c177;
            --tag-bg: rgba(38, 35, 58, 0.7);
            --tag-active-bg: #393552;
            --slider-thumb: #e0def4;
            --slider-thumb-hover: #f0efff;
            --glow: rgba(196, 167, 231, 0.4);
        }

        [data-theme="tokyo"] {
            --bg: #1a1b26;
            --bg-sidebar: #16171e;
            --bg-bar: #13141b;
            --bg-card: #24283b;
            --bg-hover: rgba(36, 40, 59, 0.5);
            --bg-active: rgba(36, 40, 59, 0.7);
            --border: rgba(36, 40, 59, 0.6);
            --border-bar: rgba(36, 40, 59, 0.4);
            --fg: #a9b1d6;
            --fg-bright: #c0caf5;
            --fg-dim: #565f89;
            --fg-muted: #3b4261;
            --fg-subtle: #545c7e;
            --accent: #7aa2f7;
            --accent-dim: #3d59a1;
            --accent2: #bb9af7;
            --btn-bg: #c0caf5;
            --btn-bg-hover: #dce2ff;
            --btn-fg: #1a1b26;
            --progress-bg: #3b4261;
            --progress-hover: #545c7e;
            --grad-start: #c0caf5;
            --grad-mid: #7aa2f7;
            --grad-end: #bb9af7;
            --tag-bg: rgba(36, 40, 59, 0.6);
            --tag-active-bg: #3b4261;
            --slider-thumb: #c0caf5;
            --slider-thumb-hover: #dce2ff;
            --glow: rgba(122, 162, 247, 0.4);
        }

        [data-theme="catppuccin"] {
            --bg: #1e1e2e;
            --bg-sidebar: #181825;
            --bg-bar: #14141e;
            --bg-card: #313244;
            --bg-hover: rgba(49, 50, 68, 0.5);
            --bg-active: rgba(49, 50, 68, 0.7);
            --border: rgba(49, 50, 68, 0.6);
            --border-bar: rgba(49, 50, 68, 0.4);
            --fg: #cdd6f4;
            --fg-bright: #e4e8fb;
            --fg-dim: #7f849c;
            --fg-muted: #585b70;
            --fg-subtle: #6c7086;
            --accent: #cba6f7;
            --accent-dim: #9775c7;
            --accent2: #f5c2e7;
            --btn-bg: #cdd6f4;
            --btn-bg-hover: #e4e8fb;
            --btn-fg: #1e1e2e;
            --progress-bg: #45475a;
            --progress-hover: #585b70;
            --grad-start: #f5c2e7;
            --grad-mid: #cba6f7;
            --grad-end: #89b4fa;
            --tag-bg: rgba(49, 50, 68, 0.6);
            --tag-active-bg: #45475a;
            --slider-thumb: #cdd6f4;
            --slider-thumb-hover: #e4e8fb;
            --glow: rgba(203, 166, 247, 0.4);
        }

        [data-theme="midnight"] {
            --bg: #0f0f14;
            --bg-sidebar: #0a0a0e;
            --bg-bar: #080810;
            --bg-card: #1a1a24;
            --bg-hover: rgba(26, 26, 36, 0.6);
            --bg-active: rgba(26, 26, 36, 0.8);
            --border: rgba(30, 30, 44, 0.5);
            --border-bar: rgba(30, 30, 44, 0.3);
            --fg: #b0b8d1;
            --fg-bright: #d4daf0;
            --fg-dim: #5a6080;
            --fg-muted: #353848;
            --fg-subtle: #484d64;
            --accent: #6ec1e4;
            --accent-dim: #3a8ab5;
            --accent2: #c792ea;
            --btn-bg: #b0b8d1;
            --btn-bg-hover: #d4daf0;
            --btn-fg: #0f0f14;
            --progress-bg: #252535;
            --progress-hover: #353848;
            --grad-start: #d4daf0;
            --grad-mid: #6ec1e4;
            --grad-end: #c792ea;
            --tag-bg: rgba(26, 26, 36, 0.7);
            --tag-active-bg: #252535;
            --slider-thumb: #b0b8d1;
            --slider-thumb-hover: #d4daf0;
            --glow: rgba(110, 193, 228, 0.3);
        }

        /* ========== BASE STYLES ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100vh; overflow: hidden; }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 1fr 80px;
            opacity: 0;
            animation: fadeInPage 0.8s ease-out forwards;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.025;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }

        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        /* ========== SIDEBAR ========== */
        #sidebar {
            grid-row: 1 / 2;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 2;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        #sidebar-header {
            padding: 24px 20px 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #sidebar-header h2 {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--fg-dim);
        }

        /* Theme picker */
        #theme-picker {
            position: relative;
        }

        #theme-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--fg-dim);
            font-size: 0.6rem;
            font-weight: 500;
            font-family: inherit;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }

        #theme-btn:hover {
            color: var(--fg-bright);
            border-color: var(--fg-muted);
            background: var(--bg-hover);
        }

        #theme-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            z-index: 100;
            min-width: 140px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        #theme-dropdown.open { display: block; }

        #theme-dropdown button {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            background: none;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: 0.72rem;
            padding: 7px 10px;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            transition: background 0.1s;
        }

        #theme-dropdown button:hover { background: var(--bg-hover); }
        #theme-dropdown button.active { color: var(--accent); }

        .theme-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        #track-list-wrapper {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 0 8px 12px;
        }

        #track-list-wrapper::-webkit-scrollbar { width: 4px; }
        #track-list-wrapper::-webkit-scrollbar-track { background: transparent; }
        #track-list-wrapper::-webkit-scrollbar-thumb { background: var(--progress-bg); border-radius: 2px; }
        #track-list-wrapper::-webkit-scrollbar-thumb:hover { background: var(--progress-hover); }
        #track-list-wrapper { scrollbar-width: thin; scrollbar-color: var(--progress-bg) transparent; }

        #track-list { list-style: none; }

        #track-list li {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s ease-out;
            gap: 10px;
            opacity: 0;
            animation: fadeInTrack 0.3s ease-out forwards;
        }

        #track-list li:hover { background: var(--bg-hover); }
        #track-list li.active { background: var(--bg-active); }

        @keyframes fadeInTrack {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .now-playing-indicator { display: flex; align-items: flex-end; gap: 2px; width: 18px; height: 14px; flex-shrink: 0; }
        .now-playing-indicator .bar { width: 3px; background: var(--accent); border-radius: 1px; animation-duration: 0.8s; animation-iteration-count: infinite; animation-timing-function: ease-in-out; }
        .now-playing-indicator .bar:nth-child(1) { height: 60%; animation-name: eqBar1; }
        .now-playing-indicator .bar:nth-child(2) { height: 100%; animation-name: eqBar2; animation-delay: 0.2s; }
        .now-playing-indicator .bar:nth-child(3) { height: 40%; animation-name: eqBar3; animation-delay: 0.4s; }
        .now-playing-indicator.paused .bar { animation-play-state: paused; }

        @keyframes eqBar1 { 0%, 100% { height: 3px; } 50% { height: 12px; } }
        @keyframes eqBar2 { 0%, 100% { height: 8px; } 50% { height: 3px; } }
        @keyframes eqBar3 { 0%, 100% { height: 5px; } 50% { height: 14px; } }

        #progress-row .time, #track-list li .track-num {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.03em;
        }

        #track-list li .track-num { font-size: 0.7rem; color: var(--fg-muted); width: 18px; text-align: right; flex-shrink: 0; }
        #track-list li.active .track-num { color: var(--accent); }
        #track-list li .track-info { flex: 1; min-width: 0; }
        #track-list li .track-info .name { font-size: 0.8rem; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
        #track-list li.active .track-info .name { color: var(--accent); }
        #track-list li .track-info .tags { display: flex; gap: 4px; margin-top: 2px; }
        #track-list li .track-info .tag { font-size: 0.55rem; font-weight: 500; color: var(--fg-dim); background: var(--tag-bg); padding: 1px 5px; border-radius: 3px; }
        #track-list li.active .track-info .tag { background: var(--tag-active-bg); color: var(--accent); }

        #empty-state { text-align: center; padding: 40px 16px; color: var(--fg-dim); font-size: 0.8rem; line-height: 1.6; }
        #empty-state code { background: var(--bg-card); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }

        /* ========== MAIN AREA ========== */
        #main-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        #main-header { flex-shrink: 0; text-align: center; margin-bottom: 32px; }

        #main-header h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: lowercase;
            margin-bottom: 6px;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-mid) 50%, var(--grad-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #main-header p { font-size: 0.78rem; font-weight: 400; color: var(--fg-dim); letter-spacing: 0.08em; text-transform: lowercase; }

        #visualizer-canvas { display: block; flex: 1; width: 100%; max-width: 900px; border-radius: 12px; min-height: 0; }

        /* ========== BOTTOM BAR ========== */
        #player-bar {
            grid-column: 1 / -1;
            grid-row: 2 / 3;
            background: var(--bg-bar);
            border-top: 1px solid var(--border-bar);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 16px;
            height: 80px;
            z-index: 2;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        #np-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
        #np-info .np-text { min-width: 0; }
        #np-info .np-title { font-size: 0.82rem; font-weight: 500; color: var(--fg-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
        .np-empty-state { font-style: italic; color: var(--fg-muted) !important; }
        #np-info .np-tags { display: flex; gap: 4px; margin-top: 2px; }
        #np-info .np-tags .tag { font-size: 0.55rem; font-weight: 500; color: var(--fg-dim); background: var(--bg-card); padding: 1px 5px; border-radius: 3px; }

        #player-center { display: flex; flex-direction: column; align-items: center; gap: 4px; max-width: 600px; width: 100%; margin: 0 auto; }

        #controls { display: flex; align-items: center; justify-content: center; gap: 16px; }
        #controls button { background: none; border: none; color: var(--fg-subtle); cursor: pointer; padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: color 0.15s ease, transform 0.1s ease; }
        #controls button:hover { color: var(--fg-bright); transform: scale(1.05); }
        #controls button:active { transform: scale(0.97); }
        #controls button svg { width: 16px; height: 16px; fill: currentColor; }

        #play-btn { background: var(--btn-bg) !important; color: var(--btn-fg) !important; width: 32px; height: 32px; }
        #play-btn svg { width: 16px; height: 16px; }
        #play-btn:hover { background: var(--btn-bg-hover) !important; transform: scale(1.06); }

        @keyframes playPulse {
            0% { box-shadow: 0 0 0 0 var(--glow); }
            70% { box-shadow: 0 0 0 6px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }
        #play-btn.pulsing { animation: playPulse 2s ease-in-out infinite; }

        #progress-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        #progress-row .time { font-size: 0.6rem; color: var(--fg-subtle); min-width: 32px; text-align: center; }

        #progress-container { position: relative; flex: 1; height: 4px; background: var(--progress-bg); border-radius: 2px; cursor: pointer; transition: height 0.1s ease; }
        #progress-container:hover { height: 6px; }
        #progress-bar { position: relative; height: 100%; background: var(--fg); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
        #progress-container:hover #progress-bar { background: var(--accent); }
        #progress-bar::after { content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%) scale(0); width: 10px; height: 10px; background: var(--fg); border-radius: 50%; transition: transform 0.15s ease-out; }
        #progress-container:hover #progress-bar::after { transform: translateY(-50%) scale(1); }

        #player-right { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
        #player-right svg { width: 16px; height: 16px; fill: var(--fg-subtle); flex-shrink: 0; }

        #shuffle-btn.active { color: var(--accent) !important; }
        #repeat-btn.active { color: var(--accent) !important; }
        #repeat-btn.repeat-one { color: var(--accent) !important; position: relative; }
        #repeat-btn.repeat-one::after { content: '1'; position: absolute; font-size: 0.45rem; font-weight: 700; top: 2px; right: 2px; color: var(--accent); font-family: 'Inter', sans-serif; }

        #volume-slider { -webkit-appearance: none; appearance: none; width: 100px; height: 4px; background: var(--progress-bg); border-radius: 2px; outline: none; }
        #volume-slider:hover { background: var(--progress-hover); }
        #volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--slider-thumb); border-radius: 50%; cursor: pointer; transition: background 0.15s; }
        #volume-slider::-webkit-slider-thumb:hover { background: var(--slider-thumb-hover); }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>Songs</h2>
            <div id="theme-picker">
                <button id="theme-btn">Theme</button>
                <div id="theme-dropdown">
                    <button data-theme="gruvbox"><span class="theme-dot" style="background:#b8bb26"></span>Gruvbox</button>
                    <button data-theme="nord"><span class="theme-dot" style="background:#88c0d0"></span>Nord</button>
                    <button data-theme="rosepine"><span class="theme-dot" style="background:#c4a7e7"></span>Rosé Pine</button>
                    <button data-theme="tokyo"><span class="theme-dot" style="background:#7aa2f7"></span>Tokyo Night</button>
                    <button data-theme="catppuccin"><span class="theme-dot" style="background:#cba6f7"></span>Catppuccin</button>
                    <button data-theme="midnight"><span class="theme-dot" style="background:#6ec1e4"></span>Midnight</button>
                </div>
            </div>
        </div>
        <div id="track-list-wrapper">
            <ul id="track-list"></ul>
            <div id="empty-state" style="display:none;">
                No tracks yet.<br>Drop audio files in the <code>music/</code> folder.
            </div>
        </div>
    </div>

    <div id="main-area">
        <header id="main-header">
            <h1>peter's music</h1>
            <p>made with ai, listened to daily</p>
        </header>
        <canvas id="visualizer-canvas"></canvas>
    </div>

    <div id="player-bar">
        <div id="np-info">
            <div class="np-text">
                <div class="np-title np-empty-state" id="np-title">select a track</div>
                <div class="np-tags" id="np-tags"></div>
            </div>
        </div>

        <div id="player-center">
            <div id="controls">
                <button id="shuffle-btn" title="Shuffle">
                    <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                </button>
                <button id="prev-btn" title="Previous">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="play-btn" title="Play">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button id="next-btn" title="Next">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <button id="repeat-btn" title="Repeat">
                    <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
            </div>
            <div id="progress-row">
                <span class="time" id="time-current">0:00</span>
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <span class="time" id="time-total">0:00</span>
            </div>
        </div>

        <div id="player-right">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // ===== THEME SYSTEM =====
        const themeBtn = document.getElementById('theme-btn');
        const themeDropdown = document.getElementById('theme-dropdown');
        const themeButtons = themeDropdown.querySelectorAll('button');

        function setTheme(name) {
            document.body.setAttribute('data-theme', name);
            localStorage.setItem('theme', name);
            themeButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === name);
            });
            themeBtn.textContent = btn_label(name);
        }

        function btn_label(name) {
            const labels = { gruvbox: 'Gruvbox', nord: 'Nord', rosepine: 'Rosé Pine', tokyo: 'Tokyo', catppuccin: 'Catppuccin', midnight: 'Midnight' };
            return labels[name] || name;
        }

        themeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeDropdown.classList.toggle('open');
        });

        themeButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                setTheme(btn.dataset.theme);
                themeDropdown.classList.remove('open');
            });
        });

        document.addEventListener('click', () => themeDropdown.classList.remove('open'));

        // Load saved theme
        const saved = localStorage.getItem('theme') || 'gruvbox';
        setTheme(saved);

        // ===== PLAYER =====
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const volumeSlider = document.getElementById('volume-slider');
        const trackList = document.getElementById('track-list');
        const npTitle = document.getElementById('np-title');
        const npTags = document.getElementById('np-tags');
        const emptyState = document.getElementById('empty-state');

        let tracks = [];
        let currentIndex = -1;
        let isPlaying = false;
        let shuffleOn = false;
        let shuffleOrder = [];
        let shufflePos = -1;
        let repeatMode = 0;

        const playSvg = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        const pauseSvg = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

        fetch('tracks.json')
            .then(r => r.json())
            .then(data => {
                tracks = data;
                if (tracks.length === 0) { emptyState.style.display = 'block'; return; }
                renderTrackList();
            })
            .catch(() => { emptyState.style.display = 'block'; });

        function renderTrackList() {
            trackList.innerHTML = '';
            tracks.forEach((t, i) => {
                const li = document.createElement('li');
                li.style.animationDelay = (i * 0.06) + 's';
                li.innerHTML = `
                    <span class="track-num">${i + 1}</span>
                    <div class="track-info">
                        <div class="name">${esc(t.title)}</div>
                        <div class="tags">${(t.tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join('')}</div>
                    </div>`;
                li.addEventListener('click', () => playTrack(i));
                trackList.appendChild(li);
            });
        }

        function createNowPlayingIndicator(paused) {
            const div = document.createElement('div');
            div.className = 'now-playing-indicator' + (paused ? ' paused' : '');
            div.innerHTML = '<div class="bar"></div><div class="bar"></div><div class="bar"></div>';
            return div;
        }

        function playTrack(index) {
            currentIndex = index;
            audio.src = tracks[index].file;
            audio.play().catch(() => {});
            isPlaying = true;
            updateUI();
        }

        function updateUI() {
            if (currentIndex >= 0) {
                npTitle.textContent = tracks[currentIndex].title;
                npTitle.classList.remove('np-empty-state');
                npTags.innerHTML = (tracks[currentIndex].tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join('');
            } else {
                npTitle.textContent = 'select a track';
                npTitle.classList.add('np-empty-state');
                npTags.innerHTML = '';
            }

            playBtn.innerHTML = isPlaying ? pauseSvg : playSvg;
            playBtn.classList.toggle('pulsing', isPlaying);

            document.querySelectorAll('#track-list li').forEach((li, i) => {
                li.classList.toggle('active', i === currentIndex);
                const numEl = li.querySelector('.track-num');
                const ind = li.querySelector('.now-playing-indicator');
                if (i === currentIndex) {
                    if (numEl) numEl.style.display = 'none';
                    if (ind) { ind.className = 'now-playing-indicator' + (!isPlaying ? ' paused' : ''); }
                    else { li.insertBefore(createNowPlayingIndicator(!isPlaying), li.firstChild); }
                } else {
                    if (numEl) numEl.style.display = '';
                    if (ind) ind.remove();
                }
            });
        }

        playBtn.addEventListener('click', () => {
            if (currentIndex < 0 && tracks.length > 0) { playTrack(0); return; }
            if (isPlaying) { audio.pause(); } else { audio.play().catch(() => {}); }
            isPlaying = !isPlaying;
            updateUI();
        });

        prevBtn.addEventListener('click', () => {
            if (tracks.length === 0) return;
            if (audio.currentTime > 3) { audio.currentTime = 0; return; }
            if (shuffleOn) { shufflePos = Math.max(0, shufflePos - 1); playTrack(shuffleOrder[shufflePos]); }
            else { playTrack((currentIndex - 1 + tracks.length) % tracks.length); }
        });

        nextBtn.addEventListener('click', () => playNext());

        function playNext() {
            if (tracks.length === 0) return;
            if (repeatMode === 2) { audio.currentTime = 0; audio.play().catch(() => {}); return; }
            if (shuffleOn) {
                shufflePos++;
                if (shufflePos >= shuffleOrder.length) {
                    if (repeatMode === 1) { buildShuffleOrder(); } else { isPlaying = false; updateUI(); return; }
                }
                playTrack(shuffleOrder[shufflePos]);
            } else {
                const next = currentIndex + 1;
                if (next >= tracks.length) {
                    if (repeatMode === 1) { playTrack(0); } else { isPlaying = false; updateUI(); }
                } else { playTrack(next); }
            }
        }

        shuffleBtn.addEventListener('click', () => {
            shuffleOn = !shuffleOn;
            shuffleBtn.classList.toggle('active', shuffleOn);
            if (shuffleOn) buildShuffleOrder();
        });

        repeatBtn.addEventListener('click', () => {
            repeatMode = (repeatMode + 1) % 3;
            repeatBtn.classList.remove('active', 'repeat-one');
            if (repeatMode === 1) repeatBtn.classList.add('active');
            if (repeatMode === 2) repeatBtn.classList.add('repeat-one');
        });

        function buildShuffleOrder() {
            shuffleOrder = tracks.map((_, i) => i);
            for (let i = shuffleOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
            }
            shufflePos = 0;
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                timeCurrent.textContent = fmt(audio.currentTime);
                timeTotal.textContent = fmt(audio.duration);
            }
        });

        audio.addEventListener('ended', () => playNext());

        function seekFromEvent(e) {
            if (!audio.duration) return;
            const rect = progressContainer.getBoundingClientRect();
            const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            audio.currentTime = ratio * audio.duration;
        }

        let isDragging = false;
        progressContainer.addEventListener('mousedown', e => {
            isDragging = true;
            seekFromEvent(e);
        });
        document.addEventListener('mousemove', e => {
            if (isDragging) seekFromEvent(e);
        });
        document.addEventListener('mouseup', () => { isDragging = false; });

        audio.volume = 0.8;
        volumeSlider.addEventListener('input', e => { audio.volume = parseFloat(e.target.value); });

        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); playBtn.click(); }
            if (e.code === 'ArrowRight' && e.target === document.body) nextBtn.click();
            if (e.code === 'ArrowLeft' && e.target === document.body) prevBtn.click();
        });

        function fmt(s) { const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }
        function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
    </script>
</body>
</html>
